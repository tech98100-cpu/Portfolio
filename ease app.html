<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShopEase</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#0ea5e9;--pink:#06b6d4;--dark:#0a0f1a;--card:#0f1a2e;--border:rgba(14,165,233,.2)}
body{font-family:'Inter',sans-serif;background:#0f0f17;color:#e2e8f0;min-height:100vh}
header{background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cart-btn{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:.5rem;transition:.3s}
.cart-btn:hover{opacity:.85}
.cart-count{background:#fff;color:var(--purple);border-radius:999px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800}
.hero-banner{background:linear-gradient(135deg,rgba(14,165,233,.15),rgba(6,182,212,.1));border-bottom:1px solid var(--border);padding:3rem 5%;text-align:center}
.hero-banner h1{font-size:clamp(1.8rem,4vw,3rem);font-weight:800;background:linear-gradient(135deg,#fff,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.hero-banner p{color:#64748b;font-size:.95rem}
.filters{padding:1.5rem 5%;display:flex;gap:.7rem;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.filter-btn{background:rgba(139,92,246,.08);border:1px solid var(--border);color:#94a3b8;padding:.45rem 1.1rem;border-radius:999px;font-size:.8rem;cursor:pointer;transition:.3s;font-weight:500}
.filter-btn.active,.filter-btn:hover{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent;color:#fff}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem;padding:2rem 5%}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:.3s;cursor:pointer}
.product-card:hover{transform:translateY(-6px);border-color:var(--purple);box-shadow:0 15px 40px rgba(139,92,246,.2)}
.product-img{height:180px;overflow:hidden;position:relative}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.product-card:hover .product-img img{transform:scale(1.08)}
.product-badge{position:absolute;top:.7rem;left:.7rem;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:.65rem;font-weight:700;padding:.25rem .6rem;border-radius:6px;text-transform:uppercase}
.product-body{padding:1.2rem}
.product-body h3{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:.3rem}
.product-body p{font-size:.78rem;color:#64748b;margin-bottom:.8rem;line-height:1.6}
.product-footer{display:flex;justify-content:space-between;align-items:center}
.price{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.add-btn{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:.45rem 1rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;transition:.3s}
.add-btn:hover{opacity:.85;transform:scale(1.05)}
/* CART MODAL */
.cart-modal{position:fixed;top:0;right:-420px;width:420px;height:100vh;background:#0d0d18;border-left:1px solid var(--border);z-index:200;transition:.4s;display:flex;flex-direction:column;box-shadow:-20px 0 50px rgba(0,0,0,.5)}
.cart-modal.open{right:0}
.cart-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-header h2{font-size:1.1rem;font-weight:700;color:#fff}
.close-btn{background:rgba(139,92,246,.1);border:1px solid var(--border);color:#94a3b8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1.1rem;transition:.3s}
.close-btn:hover{color:#fff;border-color:var(--purple)}
.cart-items{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.cart-item{display:flex;align-items:center;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:50px;height:50px;background:rgba(139,92,246,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-info h4{font-size:.85rem;font-weight:600;color:#fff;margin-bottom:.2rem}
.cart-item-info p{font-size:.78rem;color:var(--purple)}
.cart-item-remove{background:none;border:none;color:#64748b;cursor:pointer;font-size:1rem;transition:.3s}
.cart-item-remove:hover{color:#f87171}
.cart-footer{padding:1.5rem;border-top:1px solid var(--border)}
.cart-total{display:flex;justify-content:space-between;margin-bottom:1rem}
.cart-total span{color:#94a3b8;font-size:.9rem}
.cart-total strong{color:#fff;font-size:1.1rem}
.checkout-btn{width:100%;background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:1rem;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.3s}
.checkout-btn:hover{opacity:.9;transform:translateY(-2px)}
.empty-cart{text-align:center;padding:3rem 1rem;color:#64748b}
.empty-cart div{font-size:3rem;margin-bottom:1rem}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;opacity:0;pointer-events:none;transition:.3s}
.overlay.show{opacity:1;pointer-events:all}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;padding:.8rem 1.5rem;border-radius:12px;font-size:.85rem;font-weight:600;z-index:300;transition:.4s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:480px){.cart-modal{width:100%}}
</style>
</head>
<body>

<header>
  <div class="logo">ShopEase 🛍️</div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<div class="hero-banner">
  <h1>Discover Amazing Products</h1>
  <p>Shop the latest trends at unbeatable prices</p>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="filterProducts('all',this)">All</button>
  <button class="filter-btn" onclick="filterProducts('electronics',this)">Electronics</button>
  <button class="filter-btn" onclick="filterProducts('fashion',this)">Fashion</button>
  <button class="filter-btn" onclick="filterProducts('home',this)">Home</button>
  <button class="filter-btn" onclick="filterProducts('books',this)">Books</button>
</div>

<div class="products" id="productsGrid"></div>

<!-- Cart -->
<div class="overlay" id="overlay" onclick="toggleCart()"></div>
<div class="cart-modal" id="cartModal">
  <div class="cart-header">
    <h2>Your Cart 🛒</h2>
    <button class="close-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><strong id="cartTotal">$0.00</strong></div>
    <button class="checkout-btn" onclick="checkout()">Checkout →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products=[
  {id:1,name:'Wireless Headphones',desc:'Premium sound quality with ANC technology',price:89,img:'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&q=80',cat:'electronics',badge:'Hot'},
  {id:2,name:'Smartwatch Pro',desc:'Track fitness, calls, and notifications',price:129,img:'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400&q=80',cat:'electronics',badge:'New'},
  {id:3,name:'Mechanical Keyboard',desc:'RGB backlit with tactile switches',price:74,img:'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400&q=80',cat:'electronics'},
  {id:4,name:'Leather Jacket',desc:'Premium genuine leather, slim fit',price:149,img:'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&q=80',cat:'fashion',badge:'Sale'},
  {id:5,name:'Sneakers X1',desc:'Comfortable everyday wear sneakers',price:65,img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80',cat:'fashion'},
  {id:6,name:'Sunglasses UV400',desc:'Stylish polarized UV protection',price:39,img:'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400&q=80',cat:'fashion'},
  {id:7,name:'Table Lamp',desc:'Minimalist LED desk lamp, dimmable',price:45,img:'https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=400&q=80',cat:'home'},
  {id:8,name:'Coffee Maker',desc:'Brew perfect coffee every morning',price:59,img:'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400&q=80',cat:'home',badge:'Hot'},
  {id:9,name:'Plant Pot Set',desc:'Beautiful ceramic pots set of 3',price:29,img:'https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=400&q=80',cat:'home'},
  {id:10,name:'React for Beginners',desc:'Learn React from scratch with projects',price:24,img:'https://images.unsplash.com/photo-1532012197267-da84d127e765?w=400&q=80',cat:'books'},
  {id:11,name:'Design Thinking',desc:'Master UX/UI design principles',price:19,img:'https://images.unsplash.com/photo-1541963463532-d68292c34b19?w=400&q=80',cat:'books'},
  {id:12,name:'The Pragmatic Programmer',desc:'Classic software engineering guide',price:22,img:'https://images.unsplash.com/photo-1550399105-c4db5fb85c18?w=400&q=80',cat:'books'},
];

let cart=[];
let currentFilter='all';

function renderProducts(filter='all'){
  const grid=document.getElementById('productsGrid');
  const filtered=filter==='all'?products:products.filter(p=>p.cat===filter);
  grid.innerHTML=filtered.map(p=>`
    <div class="product-card">
      <div class="product-img">
        <img src="${p.img}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1560343090-f0409e92791a?w=400&q=80'"/>
        ${p.badge?`<span class="product-badge">${p.badge}</span>`:''}
      </div>
      <div class="product-body">
        <h3>${p.name}</h3>
        <p>${p.desc}</p>
        <div class="product-footer">
          <span class="price">$${p.price}</span>
          <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterProducts(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

function addToCart(id){
  const p=products.find(x=>x.id===id);
  const existing=cart.find(x=>x.id===id);
  if(existing) existing.qty++;
  else cart.push({...p,qty:1});
  updateCart();
  showToast(`${p.emoji} ${p.name} added to cart!`);
}

function removeFromCart(id){
  cart=cart.filter(x=>x.id!==id);
  updateCart();
}

function updateCart(){
  document.getElementById('cartCount').textContent=cart.reduce((a,b)=>a+b.qty,0);
  const total=cart.reduce((a,b)=>a+b.price*b.qty,0);
  document.getElementById('cartTotal').textContent=`$${total.toFixed(2)}`;
  const itemsEl=document.getElementById('cartItems');
  if(cart.length===0){
    itemsEl.innerHTML=`<div class="empty-cart"><div>🛒</div><p>Your cart is empty</p></div>`;
  } else {
    itemsEl.innerHTML=cart.map(i=>`
      <div class="cart-item">
        <div class="cart-item-img">${i.emoji}</div>
        <div class="cart-item-info">
          <h4>${i.name} x${i.qty}</h4>
          <p>$${(i.price*i.qty).toFixed(2)}</p>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${i.id})">✕</button>
      </div>
    `).join('');
  }
}

function toggleCart(){
  document.getElementById('cartModal').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function checkout(){
  if(cart.length===0)return;
  cart=[];
  updateCart();
  toggleCart();
  showToast('🎉 Order placed successfully!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

renderProducts();
updateCart();
</script>
</body>
</html>
