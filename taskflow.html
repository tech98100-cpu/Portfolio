<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TaskFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#8b5cf6;--pink:#ec4899;--dark:#0a0a0f;--card:#13131f;--border:rgba(139,92,246,.2)}
body{font-family:'Inter',sans-serif;background:#0f0f17;color:#e2e8f0;min-height:100vh}
header{background:rgba(10,10,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 5%;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.add-task-btn{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.3s}
.add-task-btn:hover{opacity:.85}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;padding:2rem 5%;min-height:calc(100vh - 70px)}
.column{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.2rem;display:flex;flex-direction:column;gap:1rem;min-height:400px}
.col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.col-title{font-size:.85rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.col-title.todo{color:#94a3b8}
.col-title.progress{color:#f59e0b}
.col-title.done{color:#10b981}
.col-count{background:rgba(139,92,246,.15);color:var(--purple);padding:.2rem .6rem;border-radius:999px;font-size:.72rem;font-weight:700}
.task-card{background:#0f0f17;border:1px solid var(--border);border-radius:12px;padding:1rem;cursor:grab;transition:.3s;position:relative}
.task-card:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 8px 25px rgba(139,92,246,.15)}
.task-card.dragging{opacity:.5;cursor:grabbing}
.task-card h4{font-size:.88rem;font-weight:600;color:#fff;margin-bottom:.4rem}
.task-card p{font-size:.76rem;color:#64748b;line-height:1.6;margin-bottom:.8rem}
.task-footer{display:flex;justify-content:space-between;align-items:center}
.task-tag{font-size:.65rem;padding:.2rem .6rem;border-radius:6px;font-weight:600}
.tag-design{background:rgba(139,92,246,.15);color:#a78bfa}
.tag-dev{background:rgba(16,185,129,.15);color:#34d399}
.tag-bug{background:rgba(239,68,68,.15);color:#f87171}
.tag-review{background:rgba(245,158,11,.15);color:#fbbf24}
.task-actions{display:flex;gap:.3rem}
.task-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:.8rem;padding:.2rem .4rem;border-radius:6px;transition:.3s}
.task-btn:hover{color:#fff;background:rgba(139,92,246,.2)}
.drop-zone{border:2px dashed rgba(139,92,246,.3);border-radius:12px;padding:1.5rem;text-align:center;color:#64748b;font-size:.8rem;transition:.3s;display:none}
.drop-zone.active{display:block;border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.05)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#0d0d18;border:1px solid var(--border);border-radius:20px;padding:2rem;width:90%;max-width:420px;transform:scale(.9);transition:.3s}
.modal-overlay.show .modal{transform:scale(1)}
.modal h2{font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:1.5rem}
.modal label{font-size:.75rem;color:#64748b;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:.4rem}
.modal input,.modal textarea,.modal select{width:100%;background:rgba(139,92,246,.05);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:.3s;margin-bottom:1rem}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--purple)}
.modal textarea{height:80px;resize:none}
.modal select option{background:#0d0d18}
.modal-btns{display:flex;gap:.7rem}
.modal-btns button{flex:1;padding:.8rem;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;transition:.3s}
.btn-cancel{background:rgba(139,92,246,.1);border:1px solid var(--border);color:#94a3b8}
.btn-cancel:hover{border-color:var(--purple);color:#fff}
.btn-save{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff}
.btn-save:hover{opacity:.9}
@media(max-width:768px){.board{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="logo">TaskFlow 📋</div>
  <button class="add-task-btn" onclick="openModal()">+ New Task</button>
</header>

<div class="board">
  <div class="column" id="col-todo" ondragover="dragOver(event)" ondrop="drop(event,'todo')">
    <div class="col-header">
      <span class="col-title todo">📋 To Do</span>
      <span class="col-count" id="count-todo">0</span>
    </div>
    <div id="tasks-todo"></div>
    <div class="drop-zone" id="drop-todo">Drop here</div>
  </div>
  <div class="column" id="col-progress" ondragover="dragOver(event)" ondrop="drop(event,'progress')">
    <div class="col-header">
      <span class="col-title progress">⚡ In Progress</span>
      <span class="col-count" id="count-progress">0</span>
    </div>
    <div id="tasks-progress"></div>
    <div class="drop-zone" id="drop-progress">Drop here</div>
  </div>
  <div class="column" id="col-done" ondragover="dragOver(event)" ondrop="drop(event,'done')">
    <div class="col-header">
      <span class="col-title done">✅ Done</span>
      <span class="col-count" id="count-done">0</span>
    </div>
    <div id="tasks-done"></div>
    <div class="drop-zone" id="drop-done">Drop here</div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>✦ Add New Task</h2>
    <label>Task Title</label>
    <input type="text" id="taskTitle" placeholder="e.g. Design homepage"/>
    <label>Description</label>
    <textarea id="taskDesc" placeholder="Brief description..."></textarea>
    <label>Tag</label>
    <select id="taskTag">
      <option value="design">🎨 Design</option>
      <option value="dev">💻 Development</option>
      <option value="bug">🐛 Bug Fix</option>
      <option value="review">👀 Review</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<script>
let tasks={
  todo:[
    {id:1,title:'Design landing page',desc:'Create mockup for homepage hero section',tag:'design'},
    {id:2,title:'Setup project repo',desc:'Initialize Git repo and folder structure',tag:'dev'},
  ],
  progress:[
    {id:3,title:'Build navbar component',desc:'Responsive sticky navbar with links',tag:'dev'},
    {id:4,title:'Fix login bug',desc:'Token expiry issue on mobile browsers',tag:'bug'},
  ],
  done:[
    {id:5,title:'Project planning',desc:'Define scope, timeline and deliverables',tag:'review'},
  ]
};
let dragId=null;
let nextId=6;

const tagMap={design:'tag-design',dev:'tag-dev',bug:'tag-bug',review:'tag-review'};
const tagLabel={design:'Design',dev:'Dev',bug:'Bug Fix',review:'Review'};

function render(){
  ['todo','progress','done'].forEach(col=>{
    const el=document.getElementById(`tasks-${col}`);
    el.innerHTML=tasks[col].map(t=>`
      <div class="task-card" draggable="true" id="task-${t.id}"
        ondragstart="dragStart(${t.id})" ondragend="dragEnd()">
        <h4>${t.title}</h4>
        <p>${t.desc}</p>
        <div class="task-footer">
          <span class="task-tag ${tagMap[t.tag]}">${tagLabel[t.tag]}</span>
          <div class="task-actions">
            <button class="task-btn" onclick="moveTask(${t.id},'${col}',-1)" title="Move left">←</button>
            <button class="task-btn" onclick="moveTask(${t.id},'${col}',1)" title="Move right">→</button>
            <button class="task-btn" onclick="deleteTask(${t.id},'${col}')" title="Delete">🗑</button>
          </div>
        </div>
      </div>
    `).join('');
    document.getElementById(`count-${col}`).textContent=tasks[col].length;
  });
}

function moveTask(id,col,dir){
  const cols=['todo','progress','done'];
  const idx=cols.indexOf(col);
  const newCol=cols[idx+dir];
  if(!newCol)return;
  const task=tasks[col].find(t=>t.id===id);
  tasks[col]=tasks[col].filter(t=>t.id!==id);
  tasks[newCol].push(task);
  render();
}

function deleteTask(id,col){
  tasks[col]=tasks[col].filter(t=>t.id!==id);
  render();
}

function dragStart(id){
  dragId=id;
  setTimeout(()=>document.getElementById(`task-${id}`).classList.add('dragging'),0);
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.add('active'));
}
function dragEnd(){
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('active'));
}
function dragOver(e){e.preventDefault()}
function drop(e,col){
  e.preventDefault();
  if(!dragId)return;
  let task,fromCol;
  ['todo','progress','done'].forEach(c=>{
    const found=tasks[c].find(t=>t.id===dragId);
    if(found){task=found;fromCol=c}
  });
  if(fromCol===col)return;
  tasks[fromCol]=tasks[fromCol].filter(t=>t.id!==dragId);
  tasks[col].push(task);
  dragId=null;
  render();
}

function openModal(){document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

function addTask(){
  const title=document.getElementById('taskTitle').value.trim();
  const desc=document.getElementById('taskDesc').value.trim();
  const tag=document.getElementById('taskTag').value;
  if(!title)return;
  tasks.todo.push({id:nextId++,title,desc:desc||'No description',tag});
  document.getElementById('taskTitle').value='';
  document.getElementById('taskDesc').value='';
  closeModal();
  render();
}

document.getElementById('modalOverlay').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

render();
</script>
</body>
</html>
